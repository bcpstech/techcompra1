name: Scraping Diario — TechCompara.cl

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      stores:
        description: 'Tienda a scrapear'
        required: false
        default: 'todas'
        type: choice
        options:
          - todas
          - n1g
          - alltec
          - cg
          - centrale
          - pcexpress

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  scrape:
    name: "Scraping: ${{ matrix.store.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      matrix:
        store:
          - id: n1g
            name: "N1G.cl"
            script: "scraper/stores/n1g.js"
          - id: alltec
            name: "Alltec.cl"
            script: "scraper/stores/alltec.js"
          - id: cg
            name: "CentralGamer.cl"
            script: "scraper/stores/centralgamer.js"
          - id: centrale
            name: "Centrale.cl"
            script: "scraper/stores/centrale.js"
          - id: pcexpress
            name: "PC-Express.cl"
            script: "scraper/stores/pcexpress.js"

    steps:
      # Definimos la lógica una sola vez para usarla en los pasos
      - name: Check if store should run
        id: should_run
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ github.event.inputs.stores }}" == "todas" ]] || \
             [[ "${{ github.event.inputs.stores }}" == "${{ matrix.store.id }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        if: steps.should_run.outputs.run == 'true'
      
      - uses: actions/setup-node@v5
        if: steps.should_run.outputs.run == 'true'
        with:
          node-version: '24'
          cache: 'npm'

      - name: Instalación de dependencias
        if: steps.should_run.outputs.run == 'true'
        run: npm install

      - name: Restaurar Base de Datos
        if: steps.should_run.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: db/techcompara.db
          key: db-${{ github.run_id }}
          restore-keys: db-

      - name: Inicializar DB si no existe
        if: steps.should_run.outputs.run == 'true'
        run: if [ ! -f db/techcompara.db ]; then node db/init.js; fi
        env: { DB_PATH: ./db/techcompara.db }

      - name: Ejecutar Scraper
        if: steps.should_run.outputs.run == 'true'
        run: node ${{ matrix.store.script }}
        env: { DB_PATH: ./db/techcompara.db, NODE_ENV: production }

      - name: Exportar JSON
        if: steps.should_run.outputs.run == 'true'
        run: node scripts/export-json.js
        env: { DB_PATH: ./db/techcompara.db }

      - name: Commit y Push de cambios
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.email "bot@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git add db/techcompara.db || true
          git diff --staged --quiet || (git commit -m "precios ${{ matrix.store.name }} $(date '+%Y-%m-%d')" && git pull --rebase origin main && git push)
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
