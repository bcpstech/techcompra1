        env: { DB_PATH: ./db/techcompara.db }
      - run: node scraper/stores/centrale.js
        env: { DB_PATH: ./db/techcompara.db, NODE_ENV: production }
      - run: node scripts/export-json.js
        env: { DB_PATH: ./db/techcompara.db }
      - run: |
          git config user.email "bot@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git diff --staged --quiet || git commit -m "precios N1G $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  scrape-pcexpress:
    name: "PC-Express.cl"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-centrale
    if: always() && (github.event_name == 'schedule' || github.event.inputs.stores == 'todas' || github.event.inputs.stores == 'pcexpress')
