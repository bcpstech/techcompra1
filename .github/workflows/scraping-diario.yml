name: Scraping Diario — TechCompara.cl

on:
  schedule:
    - cron: '0 3 * * *' # Corre todos los días a las 03:00 UTC
  workflow_dispatch:
    inputs:
      stores:
        description: 'Tienda a scrapear'
        required: false
        default: 'todas'
        type: choice
        options:
          - todas
          - n1g
          - alltec
          - cg
          - centrale
          - pcexpress

env:
  # Forzamos el uso de Node 24 para evitar avisos de deprecación
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  
jobs:
  scrape:
    name: "Scraping: ${{ matrix.store.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      max-parallel: 1 # Ejecuta uno tras otro para evitar conflictos en la DB y Git
      matrix:
        store:
          - id: n1g
            name: "N1G.cl"
            script: "scraper/stores/n1g.js"
          - id: alltec
            name: "Alltec.cl"
            script: "scraper/stores/alltec.js"
          - id: cg
            name: "CentralGamer.cl"
            script: "scraper/stores/centralgamer.js"
          - id: centrale
            name: "Centrale.cl"
            script: "scraper/stores/centrale.js"
          - id: pcexpress
            name: "PC-Express.cl"
            script: "scraper/stores/pcexpress.js"

    steps:
      # 1. Validamos si este Job debe ejecutarse según el input o el schedule
      - name: Validar ejecución
        id: should_run
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]] || \
             [[ "${{ github.event.inputs.stores }}" == "todas" ]] || \
             [[ "${{ github.event.inputs.stores }}" == "${{ matrix.store.id }}" ]]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      # 2. Descargar el código
      - name: Checkout
        if: steps.should_run.outputs.run == 'true'
        uses: actions/checkout@v5
      
      # 3. Configurar entorno de Node.js 24
      - name: Setup Node.js
        if: steps.should_run.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 4. Instalar dependencias
      - name: Instalación de dependencias
        if: steps.should_run.outputs.run == 'true'
        run: npm install

      # 5. Gestionar Cache de la Base de Datos SQLite
      - name: Restaurar Base de Datos
        if: steps.should_run.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: db/techcompara.db
          key: db-${{ github.run_id }}
          restore-keys: db-

      - name: Inicializar DB si no existe
        if: steps.should_run.outputs.run == 'true'
        run: if [ ! -f db/techcompara.db ]; then node db/init.js; fi
        env: { DB_PATH: ./db/techcompara.db }

      # 6. Ejecución del Scraping propiamente tal
     - name: Ejecutar Scraper
        if: steps.should_run.outputs.run == 'true'
        # Reemplaza la línea de 'run' por esta:
        run: node ${{ matrix.store.script }} || (echo "Fallo en ${{ matrix.store.name }}" && exit 1)
        env: { DB_PATH: ./db/techcompara.db, NODE_ENV: production }
        
      # 7. Generar los archivos JSON para la web
      - name: Exportar JSON
        if: steps.should_run.outputs.run == 'true'
        run: node scripts/export-json.js
        env: { DB_PATH: ./db/techcompara.db }

      # 8. Guardar cambios en el repositorio
      - name: Commit y Push de cambios
        if: steps.should_run.outputs.run == 'true'
        run: |
          git config user.email "bot@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git add db/techcompara.db || true
          git diff --staged --quiet || (git commit -m "precios ${{ matrix.store.name }} $(date '+%Y-%m-%d')" && git pull --rebase origin main && git push)
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
