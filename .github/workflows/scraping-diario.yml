name: Scraping Diario — TechCompara.cl

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      stores:
        description: 'Tienda a scrapear'
        required: false
        default: 'todas'
        type: choice
        options:
          - todas
          - n1g
          - alltec
          - cg
          - centrale
          - pcexpress

jobs:
  scrape-n1g:
    name: "N1G.cl"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule' || github.event.inputs.stores == 'todas' || github.event.inputs.stores == 'n1g'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}
      - run: npm install
      - uses: actions/cache@v4
        with:
          path: db/techcompara.db
          key: db-${{ github.run_number }}
          restore-keys: db-
      - run: if [ ! -f db/techcompara.db ]; then node db/init.js; fi
        env: { DB_PATH: ./db/techcompara.db }
      - run: node scraper/stores/n1g.js
        env: { DB_PATH: ./db/techcompara.db, NODE_ENV: production }
      - run: node scripts/export-json.js
        env: { DB_PATH: ./db/techcompara.db }
      - run: |
          git config user.email "bot@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git diff --staged --quiet || git commit -m "precios N1G $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  scrape-alltec:
    name: "Alltec.cl"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-n1g
    if: always() && (github.event_name == 'schedule' || github.event.inputs.stores == 'todas' || github.event.inputs.stores == 'alltec')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}
      - run: npm install
      - uses: actions/cache@v4
        with:
          path: db/techcompara.db
          key: db-${{ github.run_number }}
          restore-keys: db-
      - run: if [ ! -f db/techcompara.db ]; then node db/init.js; fi
        env: { DB_PATH: ./db/techcompara.db }
      - run: node scraper/stores/alltec.js
        env: { DB_PATH: ./db/techcompara.db, NODE_ENV: production }
      - run: node scripts/export-json.js
        env: { DB_PATH: ./db/techcompara.db }
      - run: |
          git config user.email "bot@github.com"
          git config user.name "github-actions[bot]"
          git add docs/data/
          git diff --staged --quiet || git commit -m "precios N1G $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

  scrape-cg:
    name: "CentralGamer.cl"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: scrape-alltec
    if: always() && (github.event_name == 'schedule' || github.event.inputs.stores == 'todas' || github.event.inputs.stores == 'cg')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package.json') }}
